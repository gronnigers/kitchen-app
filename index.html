<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kitchen">
<title>Kitchen</title>
<!-- v3 — Green Chef-inspired light redesign -->
<style>
:root {
  --bg: #f5f5f5; --bg2: #ffffff; --bg3: #eef0f2; --bg4: #d8dce0;
  --text: #1a1a1a; --text2: #4a4a4a; --text3: #8e8e93;
  --accent: #4a7c59; --accent2: #4a7c59; --accent3: #2d6a4f;
  --accent4: #d64045; --accent5: #7b61ff;
  --green-light: rgba(74,124,89,.08); --green-mid: rgba(74,124,89,.15);
  --sep: rgba(0,0,0,.08); --card: #ffffff; --r: 16px; --r-sm: 12px;
  --safe-top: env(safe-area-inset-top,44px); --safe-bot: env(safe-area-inset-bottom,34px);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ── TOP BAR ── */
.top-bar{padding:calc(var(--safe-top)+10px) 20px 14px;background:var(--bg2);border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.top-bar h1{font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.icon-btn{background:var(--bg3);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--text2);flex-shrink:0;transition:all .15s}
.icon-btn:active{opacity:.6;transform:scale(.92)}
.icon-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEARCH + TOGGLE ── */
.search-bar{padding:10px 20px;background:var(--bg2);flex-shrink:0;border-bottom:1px solid var(--sep)}
.search-row{display:flex;gap:10px;align-items:center}
.search-input{flex:1;background:var(--bg3);border:1px solid var(--sep);border-radius:10px;padding:10px 14px;color:var(--text);font-size:15px;font-family:inherit;transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.view-toggle{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;flex-shrink:0}
.view-btn{background:none;border:none;border-radius:7px;width:34px;height:34px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.view-btn.active{background:var(--card);color:var(--text);box-shadow:var(--shadow-sm)}

/* ── TAB BAR ── */
.tab-bar{display:flex;border-top:1px solid var(--sep);background:var(--bg2);padding-bottom:var(--safe-bot);flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.3px;cursor:pointer;gap:3px;transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}

/* ── CONTENT ── */
.content{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px 16px 24px}
.tab-panel.active{display:block}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100;padding:40px 32px}
#auth-screen.hidden{display:none}
.auth-icon{font-size:80px}
.auth-title{font-size:32px;font-weight:800;text-align:center;letter-spacing:-.5px;color:var(--text)}
.auth-sub{font-size:15px;color:var(--text3);text-align:center;line-height:1.6;max-width:280px}
.sign-in-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:16px 48px;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:300px;transition:opacity .15s}
.sign-in-btn:active{opacity:.85}

/* ── BACK BUTTON ── */
.back-btn{display:flex;align-items:center;gap:5px;background:var(--bg3);border:none;border-radius:100px;padding:8px 16px 8px 10px;color:var(--text2);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .1s}
.back-btn:active{opacity:.65}

/* ── RECIPE CARD (GREEN CHEF STYLE) ── */
.recipe-grid{display:flex;flex-direction:column;gap:1px;background:var(--sep);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-md)}
.recipe-card{background:var(--card);display:flex;cursor:pointer;transition:background .12s;position:relative;min-height:130px}
.recipe-card:active{background:var(--bg3)}
.recipe-thumb{position:relative;overflow:hidden;flex-shrink:0;width:130px;min-height:130px}
.thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.thumb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0}
.in-plan-badge{position:absolute;top:8px;left:0;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:4px 10px 4px 8px;border-radius:0 6px 6px 0;z-index:3;letter-spacing:.3px;text-transform:uppercase}
.recipe-card-body{padding:14px 16px;display:flex;flex-direction:column;justify-content:center;flex:1;min-width:0}
.recipe-name{font-size:15px;font-weight:800;line-height:1.3;margin-bottom:4px;text-transform:uppercase;letter-spacing:.2px;color:var(--text)}
.recipe-desc{font-size:13px;color:var(--text2);line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.recipe-meta{font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:600}
.recipe-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.2px}
.tag-veggie{background:#e8f5e9;color:#2e7d32}
.tag-gluten-free{background:#e3f2fd;color:#1565c0}
.tag-quick{background:#fff3e0;color:#e65100}
.tag-default{background:var(--green-light);color:var(--accent)}
.add-btn-sm{display:none}
.add-btn-sm.in-plan{display:none}

/* ── RECIPE ROW (COMPACT LIST) ── */
.recipe-list{display:flex;flex-direction:column;gap:1px;background:var(--sep);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-md)}
.recipe-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);cursor:pointer;transition:background .12s}
.recipe-row:active{background:var(--bg3)}
.recipe-row-thumb{width:56px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0;position:relative}
.recipe-row-body{flex:1;min-width:0}
.recipe-row-name{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:2px;text-transform:uppercase;letter-spacing:.2px}
.recipe-row-meta{font-size:12px;color:var(--text3);margin-bottom:4px}
.recipe-row-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.add-btn-xs{display:none}
.add-btn-xs.in-plan{display:none}
.row-chevron{color:var(--text3);font-size:18px;line-height:1}

/* ── WEEK TAB ── */
.week-heading{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px;color:var(--text)}
.week-sub{font-size:13px;color:var(--text3);margin-bottom:18px}
.day-strip{background:var(--card);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--sep)}
.day-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 14px 6px}
.day-recipes{padding:0 10px 10px;display:flex;flex-wrap:wrap;gap:6px;min-height:30px}
.recipe-chip{background:var(--bg3);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;color:var(--text)}
.chip-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0}
.day-empty{font-size:13px;color:var(--text3);padding:4px;font-style:italic}
.on-deck-section{margin-bottom:16px}
.section-title{font-size:18px;font-weight:700;margin-bottom:12px;letter-spacing:-.2px;color:var(--text)}
.on-deck-chips{display:flex;flex-wrap:wrap;gap:8px}
.deck-chip{background:var(--green-light);border:1.5px solid var(--green-mid);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer}

/* ── INSIGHTS ── */
.insights-card{background:var(--green-light);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:16px;border:1px solid var(--green-mid)}
.insights-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px}
.insight-row{font-size:13px;color:var(--text2);margin-bottom:4px;line-height:1.4}

/* ── ACTION BUTTONS ── */
.action-row{display:flex;gap:10px;margin-bottom:20px}
.action-btn{flex:1;padding:14px 10px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.action-btn:active{opacity:.85;transform:scale(.98)}
.btn-shop{background:var(--accent);color:#fff}
.btn-email{background:#1a73e8;color:#fff}
.btn-email:disabled{opacity:.3;cursor:not-allowed}

/* ── SHOPPING LIST ── */
.shop-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.shop-title{font-size:22px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.shop-meta{font-size:13px;color:var(--text3);margin-top:2px}
.clear-btn{background:var(--bg3);border:1px solid var(--sep);border-radius:10px;padding:7px 14px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.cat-group{margin-bottom:12px;background:var(--card);border-radius:var(--r-sm);box-shadow:var(--shadow-sm);border:1px solid var(--sep);overflow:hidden}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s}
.cat-header:active{background:var(--bg3)}
.cat-header-left{display:flex;align-items:center;gap:8px}
.cat-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:0;padding:0;border:none}
.cat-count{font-size:11px;color:var(--text3);font-weight:500}
.cat-chevron{color:var(--text3);font-size:16px;transition:transform .2s ease;line-height:1}
.cat-chevron.collapsed{transform:rotate(-90deg)}
.cat-items{padding:0 16px;max-height:2000px;overflow:hidden;transition:max-height .3s ease,opacity .2s ease;opacity:1;border-top:1px solid var(--sep)}
.cat-items.collapsed{max-height:0;opacity:0;padding:0 16px;border-top:none}
.shop-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--sep)}
.shop-item:last-child{border-bottom:none}
.shop-cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg4);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;background:none;transition:all .15s}
.shop-cb.checked{background:var(--accent);border-color:var(--accent)}
.shop-cb.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:800}
.shop-text{font-size:15px;line-height:1.4;flex:1;color:var(--text)}
.shop-text.checked{text-decoration:line-through;color:var(--text3)}
.shared-badge{font-size:11px;color:var(--accent5);font-weight:500;display:block;margin-top:2px}

/* ── RECIPE DETAIL ── */
.recipe-detail{position:fixed;inset:0;background:var(--bg);z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column}
.recipe-detail.open{transform:translateX(0)}
.detail-header{padding:calc(var(--safe-top)+10px) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--sep)}
.detail-title{font-size:16px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;color:var(--text)}
.detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg)}
.detail-hero{height:240px;position:relative;overflow:hidden;flex-shrink:0}
.detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.detail-hero-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;z-index:0}
.detail-hero-fade{position:absolute;bottom:0;left:0;right:0;height:80px;z-index:2;pointer-events:none}
.photo-upload-btn{position:absolute;bottom:16px;right:16px;z-index:4;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--sep);border-radius:12px;padding:9px 16px;display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:all .15s;box-shadow:var(--shadow-md)}
.photo-upload-btn:active{transform:scale(.95);opacity:.8}
.photo-upload-btn svg{flex-shrink:0}
.photo-upload-btn.uploading{pointer-events:none;opacity:.6}
.photo-upload-btn.has-photo{background:rgba(74,124,89,.1);color:var(--accent);border-color:var(--green-mid)}
.detail-content{padding:18px 20px calc(var(--safe-bot)+24px)}
.detail-meta-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.detail-meta-chip{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);background:var(--bg3);border-radius:20px;padding:6px 14px;border:1px solid var(--sep)}
.ing-section-header{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.2px;color:var(--text)}
.ingredient-group{margin-bottom:18px;background:var(--card);border-radius:var(--r-sm);padding:4px 16px;box-shadow:var(--shadow-sm);border:1px solid var(--sep)}
.ing-group-name{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px}
.ing-item{font-size:15px;color:var(--text2);padding:10px 0;border-bottom:1px solid var(--sep);display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.ing-item:last-child{border-bottom:none}
.ing-item::before{content:'·';color:var(--accent);font-size:18px;font-weight:700;flex-shrink:0;margin-top:-1px}
.detail-pdf-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--card);border:1px solid var(--sep);border-radius:12px;padding:15px;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;margin:20px 0 12px;transition:all .15s;box-shadow:var(--shadow-sm)}
.detail-pdf-btn:active{opacity:.7}
.detail-add-btn{display:block;width:100%;background:var(--accent);border:none;border-radius:12px;padding:16px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:all .15s}
.detail-add-btn:active{opacity:.85;transform:scale(.98)}
.detail-add-btn.in-plan{background:rgba(214,64,69,.08);color:var(--accent4);border:1.5px solid rgba(214,64,69,.3)}

/* ── PDF VIEWER ── */
.pdf-viewer{position:fixed;inset:0;background:#222;z-index:90;display:none;flex-direction:column}
.pdf-viewer.open{display:flex}
.pdf-nav{padding:calc(var(--safe-top)+10px) 16px 12px;display:flex;align-items:center;gap:12px;background:rgba(30,30,30,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;z-index:2}
.pdf-nav .back-btn{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85)}
.pdf-nav-title{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;color:#fff}
.pdf-nav-spacer{flex-shrink:0}
.pdf-body{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;background:#222}
.pdf-body.single-page{justify-content:center}
#pdf-canvas{display:block;max-width:100%}
.pdf-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 20px}
.pdf-loading-text{font-size:14px;color:rgba(255,255,255,.5)}
.pdf-page-label{font-size:12px;color:rgba(255,255,255,.3);font-weight:500;padding:8px 0 calc(var(--safe-bot)+12px)}

/* ── DAY PICKER ── */
.day-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:flex;align-items:flex-end}
.day-picker-overlay.hidden{display:none}
.day-picker-sheet{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 20px calc(var(--safe-bot)+20px);width:100%;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.day-picker-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px;color:var(--text)}
.day-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.day-pick-btn{background:var(--bg2);border:1.5px solid var(--sep);border-radius:12px;padding:10px 6px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:64px;justify-content:center}
.day-pick-btn:active{opacity:.7;transform:scale(.95)}
.day-pick-btn.on-deck{background:var(--green-light);color:var(--accent);border-color:var(--green-mid)}
.day-pick-btn.has-meal{background:var(--green-light);border-color:var(--accent);position:relative}
.day-pick-btn.has-meal .dp-day-name{color:var(--accent)}
.dp-day-name{font-size:13px;font-weight:700}
.dp-day-detail{font-size:9px;color:var(--text3);line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
.dp-day-detail.filled{color:var(--accent)}
.dp-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.dp-empty-dot{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--bg4);flex-shrink:0}
.dp-cancel{display:block;width:100%;background:var(--bg3);border:1px solid var(--sep);border-radius:12px;padding:14px;color:var(--text2);font-size:17px;font-weight:600;cursor:pointer;margin-top:10px}

/* ── MISC ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-icon{font-size:52px}
.empty-title{font-size:20px;font-weight:700;color:var(--text)}
.empty-sub{font-size:15px;color:var(--text3);line-height:1.6}
.loading{display:flex;align-items:center;justify-content:center;padding:80px}
.spinner{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.toast{position:fixed;bottom:calc(var(--safe-bot)+70px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,30,.92);color:#fff;padding:12px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:200;backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sending-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.sending-overlay.hidden{display:none}
.sending-text{font-size:16px;font-weight:600;color:#fff}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-icon">🍳</div>
  <div class="auth-title">Kitchen</div>
  <div class="auth-sub">Your recipe library, meal planner, and shopping list — all in one place.</div>
  <button class="sign-in-btn" onclick="signIn()">Sign in with Microsoft</button>
</div>

<!-- SENDING OVERLAY -->
<div class="sending-overlay hidden" id="sending-overlay">
  <div class="spinner" style="border-top-color:var(--accent);width:44px;height:44px;border-width:4px"></div>
  <div class="sending-text" id="sending-text">Building your meal plan email…</div>
</div>

<!-- PDF VIEWER (in-app, z-index 90) -->
<div class="pdf-viewer" id="pdf-viewer">
  <div class="pdf-nav">
    <button class="back-btn" onclick="closePdfViewer()">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1L1.5 8L8.5 15" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <div class="pdf-nav-title" id="pdf-nav-title">Recipe Card</div>

function rand(n){ return b64url(crypto.getRandomValues(new Uint8Array(n))); }
async function sha256(s){ return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))); }

  if(!r.ok) throw new Error('Token request failed');

}
function saveToken(d){
  const exp=Date.now()+(d.expires_in-60)*1000;
  localStorage.setItem('access_token',d.access_token);
  if(d.refresh_token) localStorage.setItem('refresh_token',d.refresh_token);
  localStorage.setItem('token_expiry',exp);

}

const CAT_KEYWORDS = {

// ── QUANTITY PARSING & MERGING ────────────────────────────────────────────────
const FRAC_MAP={'¼':0.25,'½':0.5,'¾':0.75,'⅓':0.333,'⅔':0.667,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875};
const UNIT_ALIASES={
  'cup':'cup','cups':'cup','c':'cup',
  'tbsp':'tbsp','tablespoon':'tbsp','tablespoons':'tbsp','tbs':'tbsp',
  'tsp':'tsp','teaspoon':'tsp','teaspoons':'tsp',
  'oz':'oz','ounce':'oz','ounces':'oz',
  'lb':'lb','lbs':'lb','pound':'lb','pounds':'lb',
  'can':'can','cans':'can',
  'clove':'clove','cloves':'clove',
  'bunch':'bunch','bunches':'bunch',
  'pkg':'pkg','package':'pkg','packages':'pkg',
  'slice':'slice','slices':'slice',
  'stalk':'stalk','stalks':'stalk',
  'sprig':'sprig','sprigs':'sprig',
  'head':'head','heads':'head',
  'pinch':'pinch','dash':'dash',
};
const UNIT_PLURALS={cup:'cups',tbsp:'tbsp',tsp:'tsp',oz:'oz',lb:'lbs',can:'cans',clove:'cloves',bunch:'bunches',pkg:'packages',slice:'slices',stalk:'stalks',sprig:'sprigs',head:'heads',pinch:'pinches',dash:'dashes'};

function parseIngredient(raw){
  let s=raw.trim();
  let qty=0, unit='', name=s;

  // Match leading quantity: "1", "1.5", "1/2", "½", "1 ½", "1½"
  const qtyRe=/^([\d]+(?:\.[\d]+)?)\s*([¼-¾⅐-⅞])?/;
  const fracOnlyRe=/^([¼-¾⅐-⅞])/;
  const slashRe=/^([\d]+)\/([\d]+)/;

  let m;
  if((m=s.match(qtyRe))){
    qty=parseFloat(m[1]);
    if(m[2]) qty+=FRAC_MAP[m[2]]||0;
    s=s.slice(m[0].length).trim();
    // Check for another fraction after space
    if((m=s.match(fracOnlyRe))){
      qty+=FRAC_MAP[m[1]]||0;
      s=s.slice(m[0].length).trim();
    }
    // Check for slash fraction like "1/2"
    if((m=s.match(slashRe))){
      qty+=parseInt(m[1])/parseInt(m[2]);
      s=s.slice(m[0].length).trim();
    }
  } else if((m=s.match(fracOnlyRe))){
    qty=FRAC_MAP[m[1]]||0;
    s=s.slice(m[0].length).trim();
  } else if((m=s.match(slashRe))){
    qty=parseInt(m[1])/parseInt(m[2]);
    s=s.slice(m[0].length).trim();
  }

  // Match unit
  const unitRe=/^([a-zA-Z]+)\.?\s+/;
  if((m=s.match(unitRe))){
    const u=m[1].toLowerCase();
    if(UNIT_ALIASES[u]){
      unit=UNIT_ALIASES[u];
      s=s.slice(m[0].length).trim();
    }
  }
  // Also handle "(15 oz) can" patterns
  const parenRe=/^\([\d\s.\/oz]+\)\s*/i;
  if((m=s.match(parenRe))){
    s=s.slice(m[0].length).trim();
  }

  name=s.replace(/,\s*.*$/,'').trim(); // strip trailing notes after comma

  return {qty, unit, name, nameKey:name.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim()};
}

function formatQty(n){
  if(n===0) return '';
  const whole=Math.floor(n);
  const frac=n-whole;
  const fracs=[[0.25,'¼'],[0.333,'⅓'],[0.5,'½'],[0.667,'⅔'],[0.75,'¾'],[0.125,'⅛']];
  let fracStr='';
  for(const [v,s] of fracs){ if(Math.abs(frac-v)<0.05){ fracStr=s; break; } }
  if(!fracStr&&frac>0.01) return n%1===0?String(n):n.toFixed(1);
  if(whole===0&&fracStr) return fracStr;
  if(fracStr) return whole+' '+fracStr;
  return String(whole);
}

function formatUnit(unit,qty){
  if(!unit) return '';
  if(qty>1&&UNIT_PLURALS[unit]) return UNIT_PLURALS[unit];
  return unit;
}

function buildShoppingList(){
  const sel=selectedRecipes();
  const merged={};  // key -> {qty, unit, name, displayName, recipes[], category, raw}
  for(const fn of sel){
    const recipe=state.index.recipes.find(r=>r.filename===fn);
    if(!recipe||!recipe.ingredientGroups) continue;
    for(const grp of recipe.ingredientGroups){
      for(const item of grp.items){
        const parsed=parseIngredient(item);
        const key=parsed.nameKey+(parsed.unit?'|'+parsed.unit:'');
        if(merged[key]){
          merged[key].qty+=parsed.qty;
          if(!merged[key].recipes.includes(recipe.title)) merged[key].recipes.push(recipe.title);
          merged[key].count++;
        } else {
          merged[key]={
            qty:parsed.qty, unit:parsed.unit,
            name:parsed.name, nameKey:parsed.nameKey,
            recipes:[recipe.title],
            category:categorize(item),
            checked:false,
            count:1,
            origRaw:item
          };
        }
      }
    }
  }
  // Build display text and check status
  const items=Object.values(merged).map(it=>{
    const qStr=formatQty(it.qty);
    const uStr=formatUnit(it.unit,it.qty);
    const display=[qStr,uStr,it.name].filter(Boolean).join(' ');
    // Use the combined display as the check key, falling back to original
    const checkKey=display;
    it.display=display;
    it.checkKey=checkKey;
    it.checked=!!state.plan.checked[checkKey]||!!state.plan.checked[it.origRaw];
    return it;
  });
  const grouped={};
  for(const it of items){ (grouped[it.category]=grouped[it.category]||[]).push(it); }
  return grouped;
}

function computeInsights(){
  const sel=selectedRecipes();
  if(sel.length<2) return [];
  const sets={};
  for(const fn of sel){
    const r=state.index.recipes.find(r=>r.filename===fn); if(!r) continue;
    const words=new Set();
    for(const g of (r.ingredientGroups||[])) for(const i of g.items){
      i.toLowerCase().replace(/^[\d\s\/\.]+/,'').split(/[\s,]+/).filter(w=>w.length>3).forEach(w=>words.add(w));
    }
    sets[r.title]=words;
  }
  const titles=Object.keys(sets);
  const insights=[];
  for(let i=0;i<titles.length;i++) for(let j=i+1;j<titles.length;j++){
    const shared=[...sets[titles[i]]].filter(w=>sets[titles[j]].has(w));
    if(shared.length>=2){
      insights.push(`${titles[i]} + ${titles[j]} share ${shared.slice(0,3).join(', ')} — great combo for less waste!`);
    }
  }
  if(!insights.length&&sel.length>=2) insights.push('Good variety! Mix of proteins and flavors this week.');
  return insights;
}

function recipeEmoji(name){ return RECIPE_EMOJIS[Math.abs(name.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%RECIPE_EMOJIS.length]; }
function recipeGradient(name){ const h=Math.abs(name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)); return CARD_GRADIENTS[h%CARD_GRADIENTS.length]; }

function getThumbUrl(r){

}

function thumbImgTag(r, extraClass=''){

  if(r.thumbnailUrl&&r.thumbnailUrl.startsWith('graph://')){
    return `<img class="thumb-img ${extraClass}" data-graph-path="${r.thumbnailUrl.replace('graph://','')}" onerror="this.remove()" loading="lazy">`;
  }
  return '';
}

// Load images that require auth tokens (graph:// URLs)
async function loadAuthImages(){
  const imgs=document.querySelectorAll('img[data-graph-path]');
  if(!imgs.length) return;
  try{
    const tok=await getToken();
    for(const img of imgs){
      const path=img.getAttribute('data-graph-path');
      if(!path) continue;
      try{
        const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${encodeURIComponent(path)}:/content`,{headers:{Authorization:`Bearer ${tok}`}});
        if(r.ok){
          const blob=await r.blob();
          img.src=URL.createObjectURL(blob);
          img.removeAttribute('data-graph-path');
        }
      }catch(e){console.warn('Auth image load failed',path,e);}
    }
  }catch(e){console.warn('Auth images failed',e);}
}

// ── RENDER BROWSE ─────────────────────────────────────────────────────────────
function filterRecipes(q){
  state.filteredRecipes=state.index.recipes.filter(r=>
    r.title.toLowerCase().includes(q.toLowerCase())||(r.tags||[]).some(t=>t.toLowerCase().includes(q.toLowerCase()))
  );
  renderBrowse();
}

function tagClass(t){
  const lc=t.toLowerCase();
  if(lc.includes('veggie')||lc.includes('vegetarian')||lc.includes('vegan')) return 'tag-veggie';
  if(lc.includes('gluten')) return 'tag-gluten-free';
  if(lc.includes('quick')||lc.includes('easy')||lc.includes('fast')) return 'tag-quick';
  return 'tag-default';
}
function ingredientPreview(r){
  if(!r.ingredientGroups||!r.ingredientGroups.length) return '';
  const items=[];
  for(const grp of r.ingredientGroups){
    for(const it of grp.items){
      const clean=it.replace(/^[\d\s\/\.½¼¾⅓⅔⅛]+/,'').replace(/^\s*(cup|cups|tbsp|tsp|oz|lb|lbs|can|cans|clove|cloves|bunch|bunch|package|pkg|tablespoon|teaspoon|pound|ounce|pinch|dash)\s*/i,'').trim();
      if(clean.length>2) items.push(clean.charAt(0).toUpperCase()+clean.slice(1));
      if(items.length>=4) break;
    }
    if(items.length>=4) break;
  }
  return items.join(', ');
}

function renderBrowse(){
  const el=document.getElementById('recipe-grid-wrap');
  const recipes=state.filteredRecipes;
  document.getElementById('btn-grid').classList.toggle('active',state.viewMode==='grid');
  document.getElementById('btn-list').classList.toggle('active',state.viewMode==='list');

  if(!recipes.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No recipes found</div><div class="empty-sub">Try a different search, or add recipes via Chef.</div></div>`;
    return;
  }
  const inPlan=new Set(selectedRecipes());

  if(state.viewMode==='grid'){
    let html='<div class="recipe-grid">';
    recipes.forEach((r,i)=>{
      const ip=inPlan.has(r.filename);
      const tags=(r.tags||[]).slice(0,2).map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join('');
      const desc=ingredientPreview(r);
      const prepTime=r.prepTime&&r.prepTime!=='?'?r.prepTime:'';
      html+=`<div class="recipe-card" onclick="openRecipeDetail(${i})">
        <div class="recipe-thumb" style="background:linear-gradient(135deg,${recipeGradient(r.title).join(',')})">
          ${thumbImgTag(r)}
          <div class="thumb-emoji" style="font-size:40px">${recipeEmoji(r.title)}</div>
          ${ip?'<div class="in-plan-badge">In your plan</div>':''}
        </div>
        <div class="recipe-card-body">
          <div class="recipe-name">${r.title}</div>
          ${desc?`<div class="recipe-desc">${desc}</div>`:''}
          ${prepTime?`<div class="recipe-meta">⏱ ${prepTime}</div>`:''}
          ${tags?`<div class="recipe-tags">${tags}</div>`:''}
        </div>
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
  } else {
    let html='<div class="recipe-list">';
    recipes.forEach((r,i)=>{
      const ip=inPlan.has(r.filename);
      const tags=(r.tags||[]).slice(0,2).map(t=>`<span class="tag ${tagClass(t)}">${t}</span>`).join('');
      const meta=[r.prepTime&&r.prepTime!=='?'?r.prepTime:null, r.servings&&r.servings!=='?'?`Serves ${r.servings}`:null].filter(Boolean).join(' · ');
      html+=`<div class="recipe-row" onclick="openRecipeDetail(${i})">
        ${rowThumbHTML(r)}
        <div class="recipe-row-body">
          <div class="recipe-row-name">${r.title}</div>
          ${meta?`<div class="recipe-row-meta">${meta}</div>`:''}
          ${tags?`<div class="recipe-tags">${tags}</div>`:''}
        </div>
        <div class="recipe-row-actions">
          ${ip?'<span style="color:var(--accent);font-size:12px;font-weight:700">✓</span>':''}
          <div class="row-chevron">›</div>
        </div>
      </div>`;
    });
    html+='</div>';
    el.innerHTML=html;
  }
  // Load any auth-required images async
  loadAuthImages();
}

// ── PHOTO UPLOAD ─────────────────────────────────────────────────────────────
let _photoUploadFilename=null;

function triggerPhotoUpload(filename){
  _photoUploadFilename=filename;
  document.getElementById('photo-input').click();
}

async function handlePhotoSelect(event){
  const file=event.target.files[0];
  if(!file||!_photoUploadFilename) return;
  const filename=_photoUploadFilename;
  _photoUploadFilename=null;
  event.target.value='';

  // Show uploading state
  const btn=document.querySelector('.photo-upload-btn');
  if(btn){ btn.classList.add('uploading'); btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m-8-10H2m20 0h-4m-1.3-6.7l-2.8 2.8M7.1 16.9l-2.8 2.8m12.6 0l-2.8-2.8M7.1 7.1L4.3 4.3"/></svg> Uploading…'; }

  try{
    // Generate image filename from recipe filename
    const ext=file.name.split('.').pop()||'jpg';
    const imgName=filename.replace(/\.pdf$/i,'')+'-photo.'+ext;
    const imgPath=CONFIG.RECIPES_PATH+'/'+imgName;

    // Upload image to OneDrive
    const tok=await getToken();

    // For files under 4MB, use simple upload
    if(file.size<4*1024*1024){
      const r=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${encodeURIComponent(imgPath)}:/content`,{
        method:'PUT',
        headers:{Authorization:`Bearer ${tok}`,'Content-Type':file.type},
        body:file
      });
      if(!r.ok) throw new Error('Upload failed');
    } else {
      // For larger files, use upload session
      const sessResp=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${encodeURIComponent(imgPath)}:/createUploadSession`,{
        method:'POST',
        headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
        body:JSON.stringify({item:{'@microsoft.graph.conflictBehavior':'replace'}})
      });
      if(!sessResp.ok) throw new Error('Upload session failed');
      const sess=await sessResp.json();
      const r=await fetch(sess.uploadUrl,{method:'PUT',headers:{'Content-Length':file.size,'Content-Range':`bytes 0-${file.size-1}/${file.size}`},body:file});
      if(!r.ok) throw new Error('Upload failed');
    }

    // Get a sharing link and convert to direct-download URL
    const shareResp=await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${encodeURIComponent(imgPath)}:/createLink`,{
      method:'POST',
      headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},
      body:JSON.stringify({type:'view',scope:'anonymous'})
    });
    let thumbUrl='';
    if(shareResp.ok){
      const shareData=await shareResp.json();
      const webUrl=shareData.link.webUrl;
      // Convert sharing URL to a direct-access URL via OneDrive shares API
      const encoded='u!'+btoa(webUrl).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      thumbUrl=`https://api.onedrive.com/v1.0/shares/${encoded}/root/content`;
    }
    if(!thumbUrl){
      // Fallback: store the path so we can fetch with auth at render time
      thumbUrl='graph://'+imgPath;
    }

    // Update recipe index
    const recipe=state.index.recipes.find(r=>r.filename===filename);
    if(recipe){
      recipe.thumbnailUrl=thumbUrl;
      recipe.photoFile=imgName;
      await writeJSON(CONFIG.INDEX_FILE,state.index);
      state.filteredRecipes=[...state.index.recipes];
    }

    // Re-render everything
    renderBrowse();
    // Refresh the detail view
    const filteredIdx=state.filteredRecipes.findIndex(r=>r.filename===filename);
    if(filteredIdx>=0) openRecipeDetail(filteredIdx);
    showToast('Photo saved!');
  }catch(e){
    console.error('Photo upload failed',e);
    showToast('Photo upload failed: '+e.message);
    // Reset button state
    const btn2=document.querySelector('.photo-upload-btn');
    if(btn2){ btn2.classList.remove('uploading'); btn2.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Add photo'; }
  }
}

// ── PDF VIEWER ────────────────────────────────────────────────────────────────
let _pdfCurrentUrl = null;
let _pdfCurrentFile = null;
let _pdfCurrentTitle = null;

// Re-render on orientation change or resize
let _pdfResizeTimer=null;
window.addEventListener('resize',()=>{
  if(!document.getElementById('pdf-viewer').classList.contains('open')) return;
  clearTimeout(_pdfResizeTimer);
  _pdfResizeTimer=setTimeout(()=>{
    if(_pdfCurrentFile) openPdf(_pdfCurrentFile,_pdfCurrentTitle);
  },250);
});

async function openPdf(filename, title){
  const viewer   = document.getElementById('pdf-viewer');
  const canvas   = document.getElementById('pdf-canvas');
  const loading  = document.getElementById('pdf-loading');
  const navTitle = document.getElementById('pdf-nav-title');
  const pageLabel= document.getElementById('pdf-page-label');
  const body     = document.getElementById('pdf-body');

  _pdfCurrentFile = filename;
  _pdfCurrentTitle = title;

  navTitle.textContent = title || filename.replace(/\.pdf$/i,'');
  loading.style.display = 'flex';
  canvas.style.display  = 'none';
  pageLabel.style.display = 'none';
  viewer.classList.add('open');
  body.scrollTop = 0;

  // Revoke prior blob only if it's a different file
  const isRerender = _pdfCurrentUrl && _pdfCurrentFile === filename;
  if(_pdfCurrentUrl && !isRerender){ URL.revokeObjectURL(_pdfCurrentUrl); _pdfCurrentUrl=null; }

  try {
    if(!window.pdfjsLib) throw new Error('PDF viewer unavailable. Please refresh the app.');
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;

    if(!_pdfCurrentUrl){
      const blob = await getPdfBlob(filename);
      _pdfCurrentUrl = URL.createObjectURL(blob);
    }

    const pdfDoc = await pdfjsLib.getDocument({ url: _pdfCurrentUrl }).promise;
    const numPages = pdfDoc.numPages;

    // Clear previous pages
    // Render all pages stacked vertically
    const pages = [];
    for(let p=1; p<=numPages; p++) pages.push(await pdfDoc.getPage(p));

    // Remove old canvases except the first
    const existingCanvases = body.querySelectorAll('canvas');
    existingCanvases.forEach((c,i)=>{ if(i>0) c.remove(); });

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const availW = viewer.clientWidth;
    const navH = viewer.querySelector('.pdf-nav').offsetHeight;
    const availH = viewer.clientHeight - navH;
    const isSingle = numPages === 1;

    // For single-page PDFs, fit to fill the available space (both W and H)
    // For multi-page, fit to width and scroll vertically
    body.classList.toggle('single-page', isSingle);

    for(let idx=0; idx<pages.length; idx++){
      const page = pages[idx];
      const baseVp = page.getViewport({scale:1});

      let fitScale;
      if(isSingle){
        // Fit so the page fills the viewport — scale to whichever dimension is tighter
        const scaleW = availW / baseVp.width;
        const scaleH = availH / baseVp.height;
        fitScale = Math.max(scaleW, scaleH); // fill (crop overflow), or use Math.min to fit-contain
        // Use fit-contain so entire page is visible, then allow pinch zoom
        fitScale = Math.min(scaleW, scaleH);
        // But ensure it at least fills the width
        fitScale = Math.max(fitScale, scaleW);
      } else {
        fitScale = availW / baseVp.width;
      }

      const scale = fitScale * dpr;
      const vp = page.getViewport({scale});

      let c;
      if(idx===0){ c=canvas; }
      else {
        c=document.createElement('canvas');
        c.style.maxWidth='100%';
        c.style.display='block';
        body.insertBefore(c, pageLabel);
      }
      c.width  = vp.width;
      c.height = vp.height;
      c.style.width  = (vp.width/dpr)+'px';
      c.style.height = (vp.height/dpr)+'px';
      c.style.display='block';

      await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
    }

    loading.style.display='none';
    if(numPages>1){
      pageLabel.textContent=`${numPages} pages`;
      pageLabel.style.display='block';
    }
  } catch(e) {
    viewer.classList.remove('open');
    showToast('Could not load PDF: '+e.message);
    console.error(e);
  }
}

function closePdfViewer(){
  document.getElementById('pdf-viewer').classList.remove('open');
  const body=document.getElementById('pdf-body');
  body.classList.remove('single-page');
  body.querySelectorAll('canvas').forEach((c,i)=>{ if(i>0) c.remove(); });
  const ctx=document.getElementById('pdf-canvas').getContext('2d');
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  if(_pdfCurrentUrl){ URL.revokeObjectURL(_pdfCurrentUrl); _pdfCurrentUrl=null; }
  _pdfCurrentFile=null; _pdfCurrentTitle=null;
}

// ── QUICK ADD / TOGGLE ────────────────────────────────────────────────────────
function quickAdd(filteredIdx){

  if(state.plan.assignments[r.filename]){

// ── DAY PICKER ────────────────────────────────────────────────────────────────
function showOpenDayPicker(filename, fromDetail=false){
  state.pendingAddFile={filename,fromDetail};
  const grid=document.getElementById('day-picker-grid');
  const sel=selectedRecipes();

  // Build a map of day -> assigned recipe titles
  const dayMap={};
  for(const fn of sel){
    const day=state.plan.assignments[fn];
    if(!day) continue;
    if(!dayMap[day]) dayMap[day]=[];
    const r=state.index.recipes.find(r=>r.filename===fn);
    dayMap[day].push(r?.title||fn);
  }

  grid.innerHTML=[...DAYS,'On Deck'].map(d=>{
    if(d==='On Deck'){
      const deckCount=(dayMap['On Deck']||[]).length;
      return `<button class="day-pick-btn on-deck" onclick="assignDay('On Deck')">
        <span class="dp-day-name">📋 Deck</span>
        ${deckCount?`<span class="dp-day-detail filled">${deckCount} meal${deckCount>1?'s':''}</span>`:''}
      </button>`;
    }
    const meals=dayMap[d]||[];
    const hasMeal=meals.length>0;
    return `<button class="day-pick-btn ${hasMeal?'has-meal':''}" onclick="assignDay('${d}')">
      <span class="dp-day-name">${d.slice(0,3)}</span>
      ${hasMeal
        ?`<span class="dp-day-detail filled">${meals[0].length>12?meals[0].slice(0,11)+'…':meals[0]}</span>`
        :`<span class="dp-day-detail">Open</span>`
      }
      ${hasMeal?'<div class="dp-dot"></div>':'<div class="dp-empty-dot"></div>'}
    </button>`;
  }).join('');

  document.getElementById('day-picker-overlay').classList.remove('hidden');
}
function assignDay(day){
  const {filename,fromDetail}=state.pendingAddFile||{};
  if(!filename){closeDayPicker();return;}
  state.plan.assignments[filename]=day;
  closeDayPicker();
  savePlan(); renderBrowse();
  const r=state.index.recipes.find(r=>r.filename===filename);
  showToast(`${r?.title||filename} → ${day}`);
  if(fromDetail){
    const btn=document.getElementById('detail-add-btn');
    if(btn){ btn.textContent='✕ Remove from Plan'; btn.classList.add('in-plan'); }
  }
}
function closeDayPicker(e){
  if(e&&e.target!==document.getElementById('day-picker-overlay')) return;
  document.getElementById('day-picker-overlay').classList.add('hidden');
  state.pendingAddFile=null;
}

// ── THIS WEEK ─────────────────────────────────────────────────────────────────
function renderWeek(){
  const sel=selectedRecipes();
  const insights=computeInsights();
  let html=`<div class="week-heading">This Week</div><div class="week-sub">Week of ${weekLabel()}</div>`;

  html+=`<div class="action-row">
    <button class="action-btn btn-shop" onclick="switchTab('shop');buildAndRenderShop()">🛒 Shopping List</button>
    <button class="action-btn btn-email" id="email-btn" ${sel.length===0?'disabled':''} onclick="sendMealPlanEmail()">✉️ Email Plan</button>
  </div>`;

  if(insights.length&&sel.length>=2){
    html+=`<div class="insights-card"><div class="insights-title">💡 Smart Pairings</div>${insights.map(i=>`<div class="insight-row">• ${i}</div>`).join('')}</div>`;
  }

  const onDeck=sel.filter(fn=>state.plan.assignments[fn]==='On Deck');
  if(onDeck.length){
    html+=`<div class="on-deck-section"><div class="section-title">📋 On Deck</div><div class="on-deck-chips">`;
    for(const fn of onDeck){
      const r=state.index.recipes.find(r=>r.filename===fn);
      html+=`<div class="deck-chip" onclick="reassignDay('${fn}')">${recipeEmoji(r?.title||fn)} ${r?.title||fn}</div>`;
    }
    html+=`</div></div>`;
  }

  html+=`<div class="section-title">📅 Days</div>`;
  for(const day of DAYS){
    const dayRecipes=sel.filter(fn=>state.plan.assignments[fn]===day);
    html+=`<div class="day-strip"><div class="day-label">${day}</div><div class="day-recipes">`;
    if(dayRecipes.length){
      for(const fn of dayRecipes){
        const r=state.index.recipes.find(r=>r.filename===fn);
        html+=`<div class="recipe-chip">${recipeEmoji(r?.title||fn)} ${r?.title||fn}<button class="chip-remove" onclick="removeFromDay('${fn}')">×</button></div>`;
      }
    } else {
      html+=`<div class="day-empty">Nothing planned</div>`;
    }
    html+=`</div></div>`;
  }

  if(sel.length===0){
    html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-title">No meals planned yet</div><div class="empty-sub">Go to Recipes and tap "+ Add to Week" to build your plan.</div></div>`;
  }

  document.getElementById('week-content').innerHTML=html;
}

function removeFromDay(filename){ delete state.plan.assignments[filename]; savePlan(); renderWeek(); renderBrowse(); }
function reassignDay(filename){ showOpenDayPicker(filename); }

// ── SHOP ─────────────────────────────────────────────────────────────────────
const _collapsedCats={};

function toggleCatCollapse(cat){
  _collapsedCats[cat]=!_collapsedCats[cat];
  const items=document.getElementById('cat-items-'+cat.replace(/[^a-zA-Z]/g,''));
  const chev=document.getElementById('cat-chev-'+cat.replace(/[^a-zA-Z]/g,''));
  if(items) items.classList.toggle('collapsed',_collapsedCats[cat]);
  if(chev) chev.classList.toggle('collapsed',_collapsedCats[cat]);
}

function buildAndRenderShop(){
  const grouped=buildShoppingList();
  const sel=selectedRecipes();
  const el=document.getElementById('shop-content');
  if(sel.length===0){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your cart is empty</div><div class="empty-sub">Plan some meals first, then come back here for your list.</div></div>`;
    return;
  }
  const totalItems=Object.values(grouped).reduce((a,v)=>a+v.length,0);
  const checkedCount=Object.values(grouped).flat().filter(i=>i.checked).length;
  let html=`<div class="shop-header">
    <div><div class="shop-title">Shopping List</div><div class="shop-meta">${checkedCount}/${totalItems} items checked • ${sel.length} recipe${sel.length>1?'s':''}</div></div>
    <button class="clear-btn" onclick="clearChecks()">Clear</button>
  </div>`;

  const catOrder=['Produce','Meat & Protein','Dairy','Pasta & Grains','Canned & Jarred','Pantry','Other'];
  for(const cat of catOrder){
    const items=(grouped[cat]||[]);
    if(!items.length) continue;
    const catId=cat.replace(/[^a-zA-Z]/g,'');
    const isCollapsed=!!_collapsedCats[cat];
    const catChecked=items.filter(i=>i.checked).length;
    html+=`<div class="cat-group">
      <div class="cat-header" onclick="toggleCatCollapse('${cat}')">
        <div class="cat-header-left">
          <div class="cat-title">${cat}</div>
          <span class="cat-count">${catChecked}/${items.length}</span>
        </div>
        <div class="cat-chevron ${isCollapsed?'collapsed':''}" id="cat-chev-${catId}">▾</div>
      </div>
      <div class="cat-items ${isCollapsed?'collapsed':''}" id="cat-items-${catId}">`;
    for(const it of items){
      const ck=it.checked;
      const shared=it.recipes.length>1;
      const safeKey=it.checkKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+=`<div class="shop-item">
        <div class="shop-cb ${ck?'checked':''}" onclick="toggleCheck('${safeKey}')"></div>
        <div style="flex:1;min-width:0">
          <div class="shop-text ${ck?'checked':''}">${it.display}</div>
          ${shared?`<span class="shared-badge">Used in: ${it.recipes.join(' & ')}</span>`:''}
        </div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  el.innerHTML=html;
}

function toggleCheck(key){
  if(state.plan.checked[key]) delete state.plan.checked[key];
  else state.plan.checked[key]=true;
  savePlan(); buildAndRenderShop();
}
function clearChecks(){ state.plan.checked={}; savePlan(); buildAndRenderShop(); }

// ── EMAIL ─────────────────────────────────────────────────────────────────────
function getNextJoke(){
  const used=new Set(state.plan.usedJokes||[]);
  const available=DAD_JOKES.map((_,i)=>i).filter(i=>!used.has(i));
  const pool=available.length?available:DAD_JOKES.map((_,i)=>i);
  const idx=pool[Math.floor(Math.random()*pool.length)];
  state.plan.usedJokes=[...used,idx].slice(-DAD_JOKES.length);
  return {joke:DAD_JOKES[idx],idx};
}

function buildEmailHTML(joke){
  const sel=selectedRecipes();
  const grouped=buildShoppingList();
  const wkLabel=weekLabel();
  const schedule=[];
  for(const day of [...DAYS,'On Deck']){
    const drs=sel.filter(fn=>(state.plan.assignments[fn]||'On Deck')===day).map(fn=>state.index.recipes.find(r=>r.filename===fn)?.title||fn);
    if(drs.length) schedule.push({day,recipes:drs});
  }
  const catOrder=['Produce','Meat & Protein','Dairy','Pasta & Grains','Canned & Jarred','Pantry','Other'];
  let shopHTML='';
  for(const cat of catOrder){
    const items=(grouped[cat]||[]);
    if(!items.length) continue;
    shopHTML+=`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f0f0f0">${cat}</div>
      ${items.map(it=>`<div style="padding:5px 0;font-size:14px;color:#333;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:16px;height:16px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0"></span>${it.display||it.name}${it.recipes.length>1?' <span style="font-size:11px;color:#bf5af2">(shared)</span>':''}</div>`).join('')}
    </div>`;
  }
  return `<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
<div style="max-width:600px;margin:20px auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)">
  <div style="background:linear-gradient(135deg,#ff9f0a,#ff6b35);padding:32px 28px">
    <div style="font-size:36px;margin-bottom:8px">🍳</div>
    <h1 style="color:#fff;margin:0;font-size:28px;font-weight:800;letter-spacing:-.5px">Meal Plan</h1>
    <p style="color:rgba(255,255,255,.85);margin:6px 0 0;font-size:15px">Week of ${wkLabel}</p>
  </div>
  <div style="padding:28px 28px 0">
    <h2 style="font-size:16px;font-weight:700;color:#1a1a1a;margin:0 0 16px">📅 This Week's Lineup</h2>
    ${schedule.map(({day,recipes})=>`<div style="display:flex;align-items:flex-start;gap:16px;padding:10px 0;border-bottom:1px solid #f5f5f5"><div style="font-size:13px;font-weight:700;color:#999;text-transform:uppercase;min-width:70px;padding-top:2px">${day==='On Deck'?'📋 On Deck':day.slice(0,3)}</div><div style="flex:1">${recipes.map(r=>`<div style="font-size:15px;color:#1a1a1a;font-weight:500;margin-bottom:2px">${r}</div>`).join('')}</div></div>`).join('')}
  </div>
  <div style="padding:24px 28px 0">
    <h2 style="font-size:16px;font-weight:700;color:#1a1a1a;margin:0 0 16px">🛒 Shopping List</h2>
    ${shopHTML}
  </div>
  <div style="margin:0 28px 24px;padding:14px 16px;background:#f8f9ff;border-radius:10px;border-left:3px solid #0a84ff">
    <p style="margin:0;font-size:13px;color:#555">📎 <strong>${sel.length} recipe card${sel.length>1?'s are':' is'} attached</strong> as PDF${sel.length>1?'s':''} to this email.</p>
  </div>
  <div style="border-top:1px solid #f0f0f0;padding:20px 28px;background:#fffbf5;text-align:center">
    <p style="margin:0 0 6px;font-size:11px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:1px">😄 Dad Joke of the Week</p>
    <p style="margin:0;font-size:15px;font-style:italic;color:#666;line-height:1.5">"${joke}"</p>
  </div>
  <div style="padding:16px 28px;text-align:center">
    <p style="margin:0;font-size:11px;color:#ccc">Sent from your Kitchen app · Happy cooking! 🍴</p>
  </div>
</div></body></html>`;
}

async function sendMealPlanEmail(){
  const sel=selectedRecipes();
  if(!sel.length){showToast('Add some recipes first!');return;}
  const overlay=document.getElementById('sending-overlay');
  const sendText=document.getElementById('sending-text');
  overlay.classList.remove('hidden');
  try{
    const {joke}=getNextJoke();
    sendText.textContent='Building email…';
    const html=buildEmailHTML(joke);
    sendText.textContent='Fetching recipe PDFs…';
    const attachments=[];
    for(const fn of sel){
      try{
        sendText.textContent=`Attaching ${fn}…`;
        const blob=await getPdfBlob(fn);
        const b64=await blobToBase64(blob);
        attachments.push({'@odata.type':'#microsoft.graph.fileAttachment',name:fn,contentType:'application/pdf',contentBytes:b64});
      }catch(e){console.warn('Attachment failed',fn,e);}
    }
    sendText.textContent='Creating Outlook draft…';
    const msg={subject:`🍳 Meal Plan — Week of ${weekLabel()}`,body:{contentType:'HTML',content:html},isDraft:true,attachments};
    const tok=await getToken();
    const r=await fetch('https://graph.microsoft.com/v1.0/me/messages',{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify(msg)});
    if(!r.ok){const err=await r.json();throw new Error(err.error?.message||r.status);}
    await savePlan();
    overlay.classList.add('hidden');
    showToast('✅ Draft saved to Outlook!');
  }catch(e){
    overlay.classList.add('hidden');
    showToast('Email failed: '+e.message);
    console.error(e);
  }
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('search-bar').style.display=tab==='browse'?'block':'none';
  state.currentTab=tab;
  if(tab==='week') renderWeek();
  if(tab==='shop') buildAndRenderShop();
}

async function refreshApp(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.disabled=true;
  await loadData(); renderBrowse();
  if(state.currentTab==='week') renderWeek();
  if(state.currentTab==='shop') buildAndRenderShop();
  btn.classList.remove('spinning'); btn.disabled=false;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  const params=new URLSearchParams(location.search);
  const code=params.get('code'),st=params.get('state');
  if(code){
    if(st!==localStorage.getItem('pkce_s')){alert('Auth state mismatch.');return;}
    history.replaceState({},'',location.pathname);
    try{await exchangeCode(code);}catch(e){alert('Auth failed: '+e.message);return;}
  }
  const tok=localStorage.getItem('access_token');
  const exp=+localStorage.getItem('token_expiry');
  if(!tok||Date.now()>=exp){
    try{await doRefresh();}
    catch{
      document.getElementById('auth-screen').classList.remove('hidden');
      document.getElementById('app').style.display='none';
      return;
    }
  } else {state.accessToken=tok;state.tokenExpiry=exp;}
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  // Apply saved view mode
  document.getElementById('btn-grid').classList.toggle('active',state.viewMode==='grid');
  document.getElementById('btn-list').classList.toggle('active',state.viewMode==='list');
  await loadData();
  renderBrowse();
}
init();
</script>
