<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kitchen">
<title>Kitchen</title>
<!-- v2 -->
<style>
:root {
  --bg: #0a0a0a; --bg2: #1c1c1e; --bg3: #2c2c2e; --bg4: #3a3a3c;
  --text: #fff; --text2: rgba(235,235,245,.82); --text3: rgba(235,235,245,.42);
  --accent: #ff9f0a; --accent2: #30d158; --accent3: #0a84ff;
  --accent4: #ff453a; --accent5: #bf5af2;
  --sep: rgba(84,84,88,.45); --card: #1c1c1e; --r: 20px; --r-sm: 14px;
  --safe-top: env(safe-area-inset-top,44px); --safe-bot: env(safe-area-inset-bottom,34px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.top-bar{padding:calc(var(--safe-top)+10px) 16px 12px;background:rgba(10,10,10,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.top-bar h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
.icon-btn{background:var(--bg3);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--text2);flex-shrink:0;transition:opacity .1s}
.icon-btn:active{opacity:.6}
.icon-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEARCH + TOGGLE ── */
.search-bar{padding:10px 16px;background:rgba(10,10,10,.7);backdrop-filter:blur(10px);flex-shrink:0;border-bottom:.5px solid var(--sep)}
.search-row{display:flex;gap:10px;align-items:center}
.search-input{flex:1;background:var(--bg3);border:none;border-radius:12px;padding:10px 14px;color:var(--text);font-size:15px;font-family:inherit}
.search-input:focus{outline:2px solid var(--accent)}
.search-input::placeholder{color:var(--text3)}
.view-toggle{display:flex;background:var(--bg3);border-radius:10px;padding:3px;gap:2px;flex-shrink:0}
.view-btn{background:none;border:none;border-radius:7px;width:34px;height:34px;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.view-btn.active{background:var(--bg4);color:var(--text)}

/* ── TAB BAR ── */
.tab-bar{display:flex;border-top:.5px solid var(--sep);background:rgba(10,10,10,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding-bottom:var(--safe-bot);flex-shrink:0}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;letter-spacing:.3px;cursor:pointer;gap:3px;transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}

/* ── CONTENT ── */
.content{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:16px}
.tab-panel.active{display:block}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100;padding:40px 32px}
#auth-screen.hidden{display:none}
.auth-icon{font-size:80px}
.auth-title{font-size:32px;font-weight:800;text-align:center;letter-spacing:-.5px}
.auth-sub{font-size:15px;color:var(--text3);text-align:center;line-height:1.6;max-width:280px}
.sign-in-btn{background:var(--accent);color:#000;border:none;border-radius:16px;padding:16px 48px;font-size:17px;font-weight:700;cursor:pointer;width:100%;max-width:300px}

/* ── BACK BUTTON ── */
.back-btn{display:flex;align-items:center;gap:5px;background:rgba(10,132,255,.14);border:none;border-radius:100px;padding:8px 16px 8px 10px;color:var(--accent3);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .1s}
.back-btn:active{opacity:.65}

/* ── RECIPE CARD (GRID) ── */
.recipe-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.recipe-card{background:var(--card);border-radius:var(--r);overflow:hidden;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .12s,opacity .12s}
.recipe-card:active{transform:scale(.96);opacity:.9}
.recipe-thumb{position:relative;overflow:hidden;flex-shrink:0}
.thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.thumb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0}
.recipe-card-body{padding:12px 12px 14px}
.recipe-name{font-size:13px;font-weight:700;line-height:1.35;margin-bottom:3px}
.recipe-meta{font-size:11px;color:var(--text3);margin-bottom:8px}
.recipe-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,159,10,.14);color:var(--accent);font-weight:600;letter-spacing:.2px}
.add-btn-sm{background:var(--accent);border:none;border-radius:10px;padding:7px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#000;width:100%;transition:opacity .1s}
.add-btn-sm:active{opacity:.75}
.add-btn-sm.in-plan{background:rgba(48,209,88,.15);color:var(--accent2);border:1.5px solid rgba(48,209,88,.5)}

/* ── RECIPE ROW (LIST) ── */
.recipe-list{display:flex;flex-direction:column;gap:8px}
.recipe-row{display:flex;align-items:center;gap:14px;padding:12px;background:var(--card);border-radius:var(--r-sm);cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.3);transition:transform .12s,opacity .12s}
.recipe-row:active{transform:scale(.98);opacity:.9}
.recipe-row-thumb{width:68px;height:68px;border-radius:12px;overflow:hidden;flex-shrink:0;position:relative}
.recipe-row-body{flex:1;min-width:0}
.recipe-row-name{font-size:15px;font-weight:600;line-height:1.3;margin-bottom:3px}
.recipe-row-meta{font-size:12px;color:var(--text3);margin-bottom:6px}
.recipe-row-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.add-btn-xs{background:var(--accent);border:none;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;color:#000;transition:opacity .1s;white-space:nowrap}
.add-btn-xs.in-plan{background:rgba(48,209,88,.15);color:var(--accent2);border:1.5px solid rgba(48,209,88,.5)}
.row-chevron{color:var(--text3);font-size:20px;line-height:1}

/* ── WEEK TAB ── */
.week-heading{font-size:22px;font-weight:800;letter-spacing:-.3px;margin-bottom:2px}
.week-sub{font-size:13px;color:var(--text3);margin-bottom:18px}
.day-strip{background:var(--card);border-radius:var(--r-sm);margin-bottom:8px;overflow:hidden}
.day-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 14px 6px}
.day-recipes{padding:0 10px 10px;display:flex;flex-wrap:wrap;gap:6px;min-height:30px}
.recipe-chip{background:var(--bg3);border-radius:20px;padding:5px 10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.chip-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;line-height:1;padding:0}
.day-empty{font-size:13px;color:var(--text3);padding:4px;font-style:italic}
.on-deck-section{margin-bottom:16px}
.section-title{font-size:18px;font-weight:700;margin-bottom:12px;letter-spacing:-.2px}
.on-deck-chips{display:flex;flex-wrap:wrap;gap:8px}
.deck-chip{background:rgba(255,159,10,.1);border:1.5px solid rgba(255,159,10,.35);border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--accent);cursor:pointer}

/* ── INSIGHTS ── */
.insights-card{background:rgba(48,209,88,.07);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:16px;border:1px solid rgba(48,209,88,.22)}
.insights-title{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:8px}
.insight-row{font-size:13px;color:var(--text2);margin-bottom:4px;line-height:1.4}

/* ── ACTION BUTTONS ── */
.action-row{display:flex;gap:10px;margin-bottom:20px}
.action-btn{flex:1;padding:14px 10px;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .1s}
.action-btn:active{opacity:.8}
.btn-shop{background:var(--accent2);color:#000}
.btn-email{background:var(--accent3);color:#fff}
.btn-email:disabled{opacity:.38;cursor:not-allowed}

/* ── SHOPPING LIST ── */
.shop-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.shop-title{font-size:22px;font-weight:800;letter-spacing:-.3px}
.shop-meta{font-size:13px;color:var(--text3);margin-top:2px}
.clear-btn{background:var(--bg3);border:none;border-radius:10px;padding:7px 14px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.cat-group{margin-bottom:22px}
.cat-title{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--sep)}
.shop-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:.5px solid rgba(84,84,88,.22)}
.shop-item:last-child{border-bottom:none}
.shop-cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg4);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;background:none}
.shop-cb.checked{background:var(--accent2);border-color:var(--accent2)}
.shop-cb.checked::after{content:'✓';color:#000;font-size:12px;font-weight:800}
.shop-text{font-size:15px;line-height:1.4;flex:1}
.shop-text.checked{text-decoration:line-through;color:var(--text3)}
.shared-badge{font-size:11px;color:var(--accent5);font-weight:500;display:block;margin-top:2px}

/* ── RECIPE DETAIL ── */
.recipe-detail{position:fixed;inset:0;background:var(--bg);z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column}
.recipe-detail.open{transform:translateX(0)}
.detail-header{padding:calc(var(--safe-top)+10px) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;background:rgba(10,10,10,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid var(--sep)}
.detail-title{font-size:16px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-hero{height:220px;position:relative;overflow:hidden;flex-shrink:0}
.detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.detail-hero-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;z-index:0}
.detail-hero-fade{position:absolute;bottom:0;left:0;right:0;height:80px;z-index:2;pointer-events:none}
.detail-content{padding:18px 20px calc(var(--safe-bot)+24px)}
.detail-meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.detail-meta-chip{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text3);background:var(--bg3);border-radius:20px;padding:5px 12px}
.ing-section-header{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.2px}
.ingredient-group{margin-bottom:18px}
.ing-group-name{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.ing-item{font-size:15px;color:var(--text2);padding:8px 0;border-bottom:.5px solid rgba(84,84,88,.2);display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.ing-item::before{content:'·';color:var(--accent);font-size:18px;font-weight:700;flex-shrink:0;margin-top:-1px}
.detail-pdf-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--bg3);border:none;border-radius:14px;padding:15px;color:var(--accent3);font-size:15px;font-weight:600;cursor:pointer;margin:20px 0 12px;border:1px solid rgba(10,132,255,.2);transition:opacity .1s}
.detail-pdf-btn:active{opacity:.7}
.detail-add-btn{display:block;width:100%;background:var(--accent);border:none;border-radius:14px;padding:16px;color:#000;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:8px;transition:opacity .1s}
.detail-add-btn:active{opacity:.8}
.detail-add-btn.in-plan{background:rgba(255,69,58,.12);color:var(--accent4);border:1.5px solid rgba(255,69,58,.35)}

/* ── PDF VIEWER ── */
.pdf-viewer{position:fixed;inset:0;background:#111;z-index:90;display:none;flex-direction:column}
.pdf-viewer.open{display:flex}
.pdf-nav{padding:calc(var(--safe-top)+10px) 16px 12px;display:flex;align-items:center;gap:12px;background:rgba(17,17,17,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:.5px solid rgba(84,84,88,.4);flex-shrink:0}
.pdf-nav-title{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.pdf-nav-spacer{flex-shrink:0}
.pdf-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center;padding:16px 8px calc(var(--safe-bot)+20px);background:#181818;gap:12px}
#pdf-canvas{max-width:100%;border-radius:8px;box-shadow:0 4px 32px rgba(0,0,0,.6)}
.pdf-loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 20px}
.pdf-loading-text{font-size:14px;color:var(--text3)}
.pdf-page-label{font-size:12px;color:rgba(255,255,255,.3);font-weight:500}

/* ── DAY PICKER ── */
.day-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:80;display:flex;align-items:flex-end}
.day-picker-overlay.hidden{display:none}
.day-picker-sheet{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 20px calc(var(--safe-bot)+20px);width:100%}
.day-picker-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px}
.day-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.day-pick-btn{background:var(--bg3);border:none;border-radius:12px;padding:12px 6px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:opacity .1s}
.day-pick-btn:active{opacity:.7}
.day-pick-btn.on-deck{background:rgba(255,159,10,.18);color:var(--accent)}
.dp-cancel{display:block;width:100%;background:var(--bg3);border:none;border-radius:14px;padding:14px;color:var(--text2);font-size:17px;font-weight:600;cursor:pointer;margin-top:10px}

/* ── MISC ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center}
.empty-icon{font-size:52px}
.empty-title{font-size:20px;font-weight:700}
.empty-sub{font-size:15px;color:var(--text3);line-height:1.6}
.loading{display:flex;align-items:center;justify-content:center;padding:80px}
.spinner{width:32px;height:32px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.toast{position:fixed;bottom:calc(var(--safe-bot)+70px);left:50%;transform:translateX(-50%) translateY(20px);background:rgba(50,50,52,.97);color:var(--text);padding:12px 20px;border-radius:20px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:200;border:.5px solid var(--sep);backdrop-filter:blur(12px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sending-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:150;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.sending-overlay.hidden{display:none}
.sending-text{font-size:16px;font-weight:600;color:#fff}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-icon">🍳</div>
  <div class="auth-title">Kitchen</div>
  <div class="auth-sub">Your recipe library, meal planner, and shopping list — all in one place.</div>
  <button class="sign-in-btn" onclick="signIn()">Sign in with Microsoft</button>
</div>

<!-- SENDING OVERLAY -->
<div class="sending-overlay hidden" id="sending-overlay">
  <div class="spinner" style="border-top-color:#0a84ff;width:44px;height:44px;border-width:4px"></div>
  <div class="sending-text" id="sending-text">Building your meal plan email…</div>
</div>

<!-- PDF VIEWER (in-app, z-index 90) -->
<div class="pdf-viewer" id="pdf-viewer">
  <div class="pdf-nav">
    <button class="back-btn" onclick="closePdfViewer()">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1L1.5 8L8.5 15" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <div class="pdf-nav-title" id="pdf-nav-title">Recipe Card</div>
    <div class="pdf-nav-spacer" style="width:70px"></div>
  </div>
  <div class="pdf-body" id="pdf-body">
    <div class="pdf-loading" id="pdf-loading">
      <div class="spinner" style="border-top-color:var(--accent);width:40px;height:40px;border-width:3.5px"></div>
      <div class="pdf-loading-text">Loading recipe card…</div>
    </div>
    <canvas id="pdf-canvas" style="display:none"></canvas>
    <div class="pdf-page-label" id="pdf-page-label" style="display:none"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;height:100dvh;flex-direction:column">
  <div class="top-bar">
    <h1>🍳 Kitchen</h1>
    <button class="icon-btn" id="refresh-btn" onclick="refreshApp()" title="Refresh">↻</button>
  </div>
  <div class="search-bar" id="search-bar" style="display:none">
    <div class="search-row">
      <input class="search-input" id="search-input" type="search" placeholder="Search recipes…" oninput="filterRecipes(this.value)">
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" onclick="setViewMode('grid')" title="Grid view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        </button>
        <button class="view-btn" id="btn-list" onclick="setViewMode('list')" title="List view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="2.5" rx="1.25"/><rect x="1" y="6.75" width="14" height="2.5" rx="1.25"/><rect x="1" y="11.5" width="14" height="2.5" rx="1.25"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="content">
    <div class="tab-panel active" id="panel-browse">
      <div id="recipe-grid-wrap"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="tab-panel" id="panel-week">
      <div id="week-content"></div>
    </div>
    <div class="tab-panel" id="panel-shop">
      <div id="shop-content"></div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-browse" onclick="switchTab('browse')">
      <span class="tab-icon">📖</span>Recipes
    </button>
    <button class="tab-btn" id="tab-week" onclick="switchTab('week')">
      <span class="tab-icon">📅</span>This Week
    </button>
    <button class="tab-btn" id="tab-shop" onclick="switchTab('shop')">
      <span class="tab-icon">🛒</span>Shop
    </button>
  </div>
</div>

<!-- RECIPE DETAIL (slide-in, z-index 50) -->
<div class="recipe-detail" id="recipe-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">
      <svg width="10" height="16" viewBox="0 0 10 16" fill="none"><path d="M8.5 1L1.5 8L8.5 15" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Recipes
    </button>
    <div class="detail-title" id="detail-title"></div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- DAY PICKER -->
<div class="day-picker-overlay hidden" id="day-picker-overlay" onclick="closeDayPicker(event)">
  <div class="day-picker-sheet" onclick="event.stopPropagation()">
    <div class="day-picker-title">Add to which day?</div>
    <div class="day-picker-grid" id="day-picker-grid"></div>
    <button class="dp-cancel" onclick="closeDayPicker()">Cancel</button>
  </div>

// ── PKCE AUTH ────────────────────────────────────────────────────────────────
function b64url(b){ return btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
function rand(n){ return b64url(crypto.getRandomValues(new Uint8Array(n))); }
async function sha256(s){ return b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s))); }

async function signIn(){
  const v=rand(32), c=await sha256(v), st=rand(16);
  localStorage.setItem('pkce_v',v); localStorage.setItem('pkce_s',st);
  const p=new URLSearchParams({client_id:CONFIG.CLIENT_ID,response_type:'code',redirect_uri:CONFIG.REDIRECT_URI,response_mode:'query',scope:CONFIG.SCOPES,state:st,code_challenge:c,code_challenge_method:'S256'});
  location.href=`https://login.microsoftonline.com/${CONFIG.TENANT_ID}/oauth2/v2.0/authorize?${p}`;
}
async function tokenPost(body){
  const r=await fetch(`https://login.microsoftonline.com/${CONFIG.TENANT_ID}/oauth2/v2.0/token`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
  if(!r.ok) throw new Error('Token request failed');
  return r.json();
}
function saveToken(d){
  const exp=Date.now()+(d.expires_in-60)*1000;
  localStorage.setItem('access_token',d.access_token);
  if(d.refresh_token) localStorage.setItem('refresh_token',d.refresh_token);
  localStorage.setItem('token_expiry',exp);
  state.accessToken=d.access_token; state.tokenExpiry=exp;
}
async function exchangeCode(code){
  const d=await tokenPost(new URLSearchParams({client_id:CONFIG.CLIENT_ID,grant_type:'authorization_code',code,redirect_uri:CONFIG.REDIRECT_URI,code_verifier:localStorage.getItem('pkce_v'),scope:CONFIG.SCOPES}));
  saveToken(d); localStorage.removeItem('pkce_v'); localStorage.removeItem('pkce_s');
}
async function doRefresh(){
  const rt=localStorage.getItem('refresh_token'); if(!rt) throw new Error('No refresh token');
  saveToken(await tokenPost(new URLSearchParams({client_id:CONFIG.CLIENT_ID,grant_type:'refresh_token',refresh_token:rt,scope:CONFIG.SCOPES})));
}
async function getToken(){
  if(state.accessToken&&Date.now()<state.tokenExpiry) return state.accessToken;
  const t=localStorage.getItem('access_token'),e=+localStorage.getItem('token_expiry');
  if(t&&Date.now()<e){state.accessToken=t;state.tokenExpiry=e;return t;}
  await doRefresh(); return state.accessToken;
}

// ── GRAPH ────────────────────────────────────────────────────────────────────
async function gfetch(path,opts={}){
  const tok=await getToken();
  return fetch(`https://graph.microsoft.com/v1.0${path}`,{...opts,headers:{Authorization:`Bearer ${tok}`,...(opts.headers||{})}});
}
async function readJSON(p){
  const r=await gfetch(`/me/drive/root:/${encodeURIComponent(p)}:/content`);
  if(r.status===404) return null; if(!r.ok) throw new Error('Read failed');
  return r.json();
}
async function writeJSON(p,obj){
  const r=await gfetch(`/me/drive/root:/${encodeURIComponent(p)}:/content`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj,null,2)});
  if(!r.ok) throw new Error('Write failed');
}
async function listFolder(p){
  const r=await gfetch(`/me/drive/root:/${encodeURIComponent(p)}:/children?$select=name,id&$top=200`);
  if(!r.ok) throw new Error('List failed'); const d=await r.json(); return d.value||[];
}
async function getPdfBlob(filename){
  const r=await gfetch(`/me/drive/root:/${encodeURIComponent(CONFIG.RECIPES_PATH+'/'+filename)}:/content`);
  if(!r.ok) throw new Error('PDF fetch failed'); return r.blob();
}
async function blobToBase64(blob){
  return new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result.split(',')[1]);fr.readAsDataURL(blob);});
}

const CAT_KEYWORDS = {

  'Meat & Protein':['chicken','beef','pork','ground','pancetta','bacon','anchovy','shrimp','egg','sausage','turkey','lamb'],
  'Dairy':         ['cheese','butter','milk','cream','feta','parmesan','cotija','sour cream','ricotta','mozzarella'],
  'Pasta & Grains':['pasta','penne','spaghetti','linguine','rice','bread','chip','tortilla','noodle','orzo','couscous'],
  'Canned & Jarred':['salsa','crushed tomatoes','olive','caper','tomato paste','wine','can ','broth','stock','sauce'],
  'Pantry':        ['oil','salt','pepper','flakes','powder','seasoning','dried','flour','sugar','vinegar','mustard'],
};
function categorize(item){
  const lc=item.toLowerCase();
  for(const [cat,kws] of Object.entries(CAT_KEYWORDS)){
    if(kws.some(k=>lc.includes(k))) return cat;
  }
  return 'Other';
}

function buildShoppingList(){
  const sel=selectedRecipes();
  const items=[];
  for(const fn of sel){
    const recipe=state.index.recipes.find(r=>r.filename===fn);
    if(!recipe||!recipe.ingredientGroups) continue;
    for(const grp of recipe.ingredientGroups){
      for(const item of grp.items){
        const existing=items.find(i=>i.raw.toLowerCase()===item.toLowerCase());
        if(existing){ existing.recipes.push(recipe.title); }
        else{ items.push({raw:item,recipes:[recipe.title],category:categorize(item),checked:!!state.plan.checked[item]}); }
      }
    }
  }
  const grouped={};
  for(const it of items){ (grouped[it.category]=grouped[it.category]||[]).push(it); }
  return grouped;
}

function computeInsights(){
  const sel=selectedRecipes();
  if(sel.length<2) return [];
  const sets={};
  for(const fn of sel){
    const r=state.index.recipes.find(r=>r.filename===fn); if(!r) continue;
    const words=new Set();
    for(const g of (r.ingredientGroups||[])) for(const i of g.items){
      i.toLowerCase().replace(/^[\d\s\/\.]+/,'').split(/[\s,]+/).filter(w=>w.length>3).forEach(w=>words.add(w));
    }
    sets[r.title]=words;
  }
  const titles=Object.keys(sets);
  const insights=[];
  for(let i=0;i<titles.length;i++) for(let j=i+1;j<titles.length;j++){
    const shared=[...sets[titles[i]]].filter(w=>sets[titles[j]].has(w));
    if(shared.length>=2){
      insights.push(`${titles[i]} + ${titles[j]} share ${shared.slice(0,3).join(', ')} — great combo for less waste!`);
    }
  }
  if(!insights.length&&sel.length>=2) insights.push('Good variety! Mix of proteins and flavors this week.');
  return insights;
}

// ── PDF VIEWER ────────────────────────────────────────────────────────────────
let _pdfCurrentUrl = null;

async function openPdf(filename, title){
  const viewer   = document.getElementById('pdf-viewer');
  const canvas   = document.getElementById('pdf-canvas');
  const loading  = document.getElementById('pdf-loading');
  const navTitle = document.getElementById('pdf-nav-title');
  const pageLabel= document.getElementById('pdf-page-label');
  const body     = document.getElementById('pdf-body');

  navTitle.textContent = title || filename.replace(/\.pdf$/i,'');
  loading.style.display = 'flex';
  canvas.style.display  = 'none';
  pageLabel.style.display = 'none';
  viewer.classList.add('open');
  body.scrollTop = 0;

  // Revoke prior blob
  if(_pdfCurrentUrl){ URL.revokeObjectURL(_pdfCurrentUrl); _pdfCurrentUrl=null; }

  try {
    if(!window.pdfjsLib) throw new Error('PDF viewer unavailable. Please refresh the app.');
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;

    const blob = await getPdfBlob(filename);
    _pdfCurrentUrl = URL.createObjectURL(blob);

    const pdfDoc = await pdfjsLib.getDocument({ url: _pdfCurrentUrl }).promise;
    const numPages = pdfDoc.numPages;

    // Clear previous pages
    // Render all pages stacked vertically
    const pages = [];
    for(let p=1; p<=numPages; p++) pages.push(await pdfDoc.getPage(p));

    // Remove old canvases except the first
    const existingCanvases = body.querySelectorAll('canvas');
    existingCanvases.forEach((c,i)=>{ if(i>0) c.remove(); });

    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const containerW = Math.min(viewer.clientWidth - 16, 800);

    for(let idx=0; idx<pages.length; idx++){
      const page = pages[idx];
      const baseVp = page.getViewport({scale:1});
      const scale  = (containerW / baseVp.width) * dpr;
      const vp     = page.getViewport({scale});

      let c;
      if(idx===0){ c=canvas; }
      else {
        c=document.createElement('canvas');
        c.className='';
        c.style.maxWidth='100%';
        c.style.borderRadius='8px';
        c.style.boxShadow='0 4px 32px rgba(0,0,0,.6)';
        body.insertBefore(c, pageLabel);
      }
      c.width  = vp.width;
      c.height = vp.height;
      c.style.width  = (vp.width/dpr)+'px';
      c.style.height = (vp.height/dpr)+'px';
      c.style.display='block';

      await page.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
    }

    loading.style.display='none';
    if(numPages>1){
      pageLabel.textContent=`${numPages} pages`;
      pageLabel.style.display='block';
    }
  } catch(e) {
    viewer.classList.remove('open');
    showToast('Could not load PDF: '+e.message);
    console.error(e);
  }
}

function closePdfViewer(){
  document.getElementById('pdf-viewer').classList.remove('open');
  // Clear extra canvases on close to free memory
  const body=document.getElementById('pdf-body');
  body.querySelectorAll('canvas').forEach((c,i)=>{ if(i>0) c.remove(); });
  const ctx=document.getElementById('pdf-canvas').getContext('2d');
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  if(_pdfCurrentUrl){ URL.revokeObjectURL(_pdfCurrentUrl); _pdfCurrentUrl=null; }
}

// ── QUICK ADD / TOGGLE ────────────────────────────────────────────────────────
function quickAdd(filteredIdx){
  const r=state.filteredRecipes[filteredIdx];
  if(state.plan.assignments[r.filename]){
    delete state.plan.assignments[r.filename];
    showToast(`Removed ${r.title}`);
    savePlan(); renderBrowse();
  } else {
    showOpenDayPicker(r.filename,false);
  }
}

function toggleFromDetail(filename){
  if(state.plan.assignments[filename]){
    delete state.plan.assignments[filename];
    showToast('Removed from plan');
    const btn=document.getElementById('detail-add-btn');
    if(btn){ btn.textContent='+ Add to This Week'; btn.classList.remove('in-plan'); }
  } else {
    showOpenDayPicker(filename,true);
  }
  savePlan(); renderBrowse();
}

// ── DAY PICKER ────────────────────────────────────────────────────────────────
function showOpenDayPicker(filename, fromDetail=false){
  state.pendingAddFile={filename,fromDetail};
  const grid=document.getElementById('day-picker-grid');
  grid.innerHTML=[...DAYS,'On Deck'].map(d=>`<button class="day-pick-btn ${d==='On Deck'?'on-deck':''}" onclick="assignDay('${d}')">${d==='On Deck'?'📋 On Deck':d.slice(0,3)}</button>`).join('');
  document.getElementById('day-picker-overlay').classList.remove('hidden');
}
function assignDay(day){
  const {filename,fromDetail}=state.pendingAddFile||{};
  if(!filename){closeDayPicker();return;}
  state.plan.assignments[filename]=day;
  closeDayPicker();
  savePlan(); renderBrowse();
  const r=state.index.recipes.find(r=>r.filename===filename);
  showToast(`${r?.title||filename} → ${day}`);
  if(fromDetail){
    const btn=document.getElementById('detail-add-btn');
    if(btn){ btn.textContent='✕ Remove from Plan'; btn.classList.add('in-plan'); }
  }
}
function closeDayPicker(e){
  if(e&&e.target!==document.getElementById('day-picker-overlay')) return;
  document.getElementById('day-picker-overlay').classList.add('hidden');
  state.pendingAddFile=null;
}

// ── THIS WEEK ─────────────────────────────────────────────────────────────────
function renderWeek(){
  const sel=selectedRecipes();
  const insights=computeInsights();
  let html=`<div class="week-heading">This Week</div><div class="week-sub">Week of ${weekLabel()}</div>`;

  html+=`<div class="action-row">
    <button class="action-btn btn-shop" onclick="switchTab('shop');buildAndRenderShop()">🛒 Shopping List</button>
    <button class="action-btn btn-email" id="email-btn" ${sel.length===0?'disabled':''} onclick="sendMealPlanEmail()">✉️ Email Plan</button>
  </div>`;

  if(insights.length&&sel.length>=2){
    html+=`<div class="insights-card"><div class="insights-title">💡 Smart Pairings</div>${insights.map(i=>`<div class="insight-row">• ${i}</div>`).join('')}</div>`;
  }

  const onDeck=sel.filter(fn=>state.plan.assignments[fn]==='On Deck');
  if(onDeck.length){
    html+=`<div class="on-deck-section"><div class="section-title">📋 On Deck</div><div class="on-deck-chips">`;
    for(const fn of onDeck){
      const r=state.index.recipes.find(r=>r.filename===fn);
      html+=`<div class="deck-chip" onclick="reassignDay('${fn}')">${recipeEmoji(r?.title||fn)} ${r?.title||fn}</div>`;
    }
    html+=`</div></div>`;
  }

  html+=`<div class="section-title">📅 Days</div>`;
  for(const day of DAYS){
    const dayRecipes=sel.filter(fn=>state.plan.assignments[fn]===day);
    html+=`<div class="day-strip"><div class="day-label">${day}</div><div class="day-recipes">`;
    if(dayRecipes.length){
      for(const fn of dayRecipes){
        const r=state.index.recipes.find(r=>r.filename===fn);
        html+=`<div class="recipe-chip">${recipeEmoji(r?.title||fn)} ${r?.title||fn}<button class="chip-remove" onclick="removeFromDay('${fn}')">×</button></div>`;
      }
    } else {
      html+=`<div class="day-empty">Nothing planned</div>`;
    }
    html+=`</div></div>`;
  }

  if(sel.length===0){
    html+=`<div class="empty-state"><div class="empty-icon">🗓</div><div class="empty-title">No meals planned yet</div><div class="empty-sub">Go to Recipes and tap "+ Add to Week" to build your plan.</div></div>`;
  }

  document.getElementById('week-content').innerHTML=html;
}

function removeFromDay(filename){ delete state.plan.assignments[filename]; savePlan(); renderWeek(); renderBrowse(); }
function reassignDay(filename){ showOpenDayPicker(filename); }

// ── SHOP ─────────────────────────────────────────────────────────────────────
function buildAndRenderShop(){
  const grouped=buildShoppingList();
  const sel=selectedRecipes();
  const el=document.getElementById('shop-content');
  if(sel.length===0){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-title">Your cart is empty</div><div class="empty-sub">Plan some meals first, then come back here for your list.</div></div>`;
    return;
  }
  const totalItems=Object.values(grouped).reduce((a,v)=>a+v.length,0);
  const checkedCount=Object.values(grouped).flat().filter(i=>i.checked).length;
  let html=`<div class="shop-header">
    <div><div class="shop-title">Shopping List</div><div class="shop-meta">${checkedCount}/${totalItems} items checked • ${sel.length} recipe${sel.length>1?'s':''}</div></div>
    <button class="clear-btn" onclick="clearChecks()">Clear</button>
  </div>`;

  const catOrder=['Produce','Meat & Protein','Dairy','Pasta & Grains','Canned & Jarred','Pantry','Other'];
  for(const cat of catOrder){
    const items=(grouped[cat]||[]);
    if(!items.length) continue;
    html+=`<div class="cat-group"><div class="cat-title">${cat}</div>`;
    for(const it of items){
      const ck=!!state.plan.checked[it.raw];
      const shared=it.recipes.length>1;
      const safeRaw=it.raw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      html+=`<div class="shop-item">
        <div class="shop-cb ${ck?'checked':''}" onclick="toggleCheck('${safeRaw}')"></div>
        <div style="flex:1;min-width:0">
          <div class="shop-text ${ck?'checked':''}">${it.raw}</div>
          ${shared?`<span class="shared-badge">Used in: ${it.recipes.join(' & ')}</span>`:''}
        </div>
      </div>`;
    }
    html+=`</div>`;
  }
  el.innerHTML=html;
}

function toggleCheck(raw){
  if(state.plan.checked[raw]) delete state.plan.checked[raw];
  else state.plan.checked[raw]=true;
  savePlan(); buildAndRenderShop();
}
function clearChecks(){ state.plan.checked={}; savePlan(); buildAndRenderShop(); }

// ── EMAIL ─────────────────────────────────────────────────────────────────────
function getNextJoke(){
  const used=new Set(state.plan.usedJokes||[]);
  const available=DAD_JOKES.map((_,i)=>i).filter(i=>!used.has(i));
  const pool=available.length?available:DAD_JOKES.map((_,i)=>i);
  const idx=pool[Math.floor(Math.random()*pool.length)];
  state.plan.usedJokes=[...used,idx].slice(-DAD_JOKES.length);
  return {joke:DAD_JOKES[idx],idx};
}

function buildEmailHTML(joke){
  const sel=selectedRecipes();
  const grouped=buildShoppingList();
  const wkLabel=weekLabel();
  const schedule=[];
  for(const day of [...DAYS,'On Deck']){
    const drs=sel.filter(fn=>(state.plan.assignments[fn]||'On Deck')===day).map(fn=>state.index.recipes.find(r=>r.filename===fn)?.title||fn);
    if(drs.length) schedule.push({day,recipes:drs});
  }
  const catOrder=['Produce','Meat & Protein','Dairy','Pasta & Grains','Canned & Jarred','Pantry','Other'];
  let shopHTML='';
  for(const cat of catOrder){
    const items=(grouped[cat]||[]);
    if(!items.length) continue;
    shopHTML+=`<div style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #f0f0f0">${cat}</div>
      ${items.map(it=>`<div style="padding:5px 0;font-size:14px;color:#333;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:16px;height:16px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0"></span>${it.raw}${it.recipes.length>1?' <span style="font-size:11px;color:#bf5af2">(shared)</span>':''}</div>`).join('')}
    </div>`;
  }
  return `<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
<div style="max-width:600px;margin:20px auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)">
  <div style="background:linear-gradient(135deg,#ff9f0a,#ff6b35);padding:32px 28px">
    <div style="font-size:36px;margin-bottom:8px">🍳</div>
    <h1 style="color:#fff;margin:0;font-size:28px;font-weight:800;letter-spacing:-.5px">Meal Plan</h1>
    <p style="color:rgba(255,255,255,.85);margin:6px 0 0;font-size:15px">Week of ${wkLabel}</p>
  </div>
  <div style="padding:28px 28px 0">
    <h2 style="font-size:16px;font-weight:700;color:#1a1a1a;margin:0 0 16px">📅 This Week's Lineup</h2>
    ${schedule.map(({day,recipes})=>`<div style="display:flex;align-items:flex-start;gap:16px;padding:10px 0;border-bottom:1px solid #f5f5f5"><div style="font-size:13px;font-weight:700;color:#999;text-transform:uppercase;min-width:70px;padding-top:2px">${day==='On Deck'?'📋 On Deck':day.slice(0,3)}</div><div style="flex:1">${recipes.map(r=>`<div style="font-size:15px;color:#1a1a1a;font-weight:500;margin-bottom:2px">${r}</div>`).join('')}</div></div>`).join('')}
  </div>
  <div style="padding:24px 28px 0">
    <h2 style="font-size:16px;font-weight:700;color:#1a1a1a;margin:0 0 16px">🛒 Shopping List</h2>
    ${shopHTML}
  </div>
  <div style="margin:0 28px 24px;padding:14px 16px;background:#f8f9ff;border-radius:10px;border-left:3px solid #0a84ff">
    <p style="margin:0;font-size:13px;color:#555">📎 <strong>${sel.length} recipe card${sel.length>1?'s are':' is'} attached</strong> as PDF${sel.length>1?'s':''} to this email.</p>
  </div>
  <div style="border-top:1px solid #f0f0f0;padding:20px 28px;background:#fffbf5;text-align:center">
    <p style="margin:0 0 6px;font-size:11px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:1px">😄 Dad Joke of the Week</p>
    <p style="margin:0;font-size:15px;font-style:italic;color:#666;line-height:1.5">"${joke}"</p>
  </div>
  <div style="padding:16px 28px;text-align:center">
    <p style="margin:0;font-size:11px;color:#ccc">Sent from your Kitchen app · Happy cooking! 🍴</p>
  </div>
</div></body></html>`;
}

async function sendMealPlanEmail(){
  const sel=selectedRecipes();
  if(!sel.length){showToast('Add some recipes first!');return;}
  const overlay=document.getElementById('sending-overlay');
  const sendText=document.getElementById('sending-text');
  overlay.classList.remove('hidden');
  try{
    const {joke}=getNextJoke();
    sendText.textContent='Building email…';
    const html=buildEmailHTML(joke);
    sendText.textContent='Fetching recipe PDFs…';
    const attachments=[];
    for(const fn of sel){
      try{
        sendText.textContent=`Attaching ${fn}…`;
        const blob=await getPdfBlob(fn);
        const b64=await blobToBase64(blob);
        attachments.push({'@odata.type':'#microsoft.graph.fileAttachment',name:fn,contentType:'application/pdf',contentBytes:b64});
      }catch(e){console.warn('Attachment failed',fn,e);}
    }
    sendText.textContent='Creating Outlook draft…';
    const msg={subject:`🍳 Meal Plan — Week of ${weekLabel()}`,body:{contentType:'HTML',content:html},isDraft:true,attachments};
    const tok=await getToken();
    const r=await fetch('https://graph.microsoft.com/v1.0/me/messages',{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify(msg)});
    if(!r.ok){const err=await r.json();throw new Error(err.error?.message||r.status);}
    await savePlan();
    overlay.classList.add('hidden');
    showToast('✅ Draft saved to Outlook!');
  }catch(e){
    overlay.classList.add('hidden');
    showToast('Email failed: '+e.message);
    console.error(e);
  }
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('search-bar').style.display=tab==='browse'?'block':'none';
  state.currentTab=tab;
  if(tab==='week') renderWeek();
  if(tab==='shop') buildAndRenderShop();
}

async function refreshApp(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning'); btn.disabled=true;
  await loadData(); renderBrowse();
  if(state.currentTab==='week') renderWeek();
  if(state.currentTab==='shop') buildAndRenderShop();
  btn.classList.remove('spinning'); btn.disabled=false;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  const params=new URLSearchParams(location.search);
  const code=params.get('code'),st=params.get('state');
  if(code){
    if(st!==localStorage.getItem('pkce_s')){alert('Auth state mismatch.');return;}
    history.replaceState({},'',location.pathname);
    try{await exchangeCode(code);}catch(e){alert('Auth failed: '+e.message);return;}
  }
  const tok=localStorage.getItem('access_token');
  const exp=+localStorage.getItem('token_expiry');
  if(!tok||Date.now()>=exp){
    try{await doRefresh();}
    catch{
      document.getElementById('auth-screen').classList.remove('hidden');
      document.getElementById('app').style.display='none';
      return;
    }
  } else {state.accessToken=tok;state.tokenExpiry=exp;}
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').style.display='flex';
  // Apply saved view mode
  document.getElementById('btn-grid').classList.toggle('active',state.viewMode==='grid');
  document.getElementById('btn-list').classList.toggle('active',state.viewMode==='list');
  await loadData();
  renderBrowse();
}
init();
</script>
